name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --verbose

      - name: Create release archive
        run: |
          mkdir release
          Copy-Item target/release/archive-extractor.exe release/
          Copy-Item README.md release/
          Copy-Item LICENSE release/ -ErrorAction SilentlyContinue
          Compress-Archive -Path release/* -DestinationPath archive-extractor-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: archive-extractor-windows-x86_64.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Build universal binary
        run: |
          cargo build --release --target x86_64-apple-darwin --verbose
          cargo build --release --target aarch64-apple-darwin --verbose

          # Create universal binary
          mkdir -p target/release/universal
          lipo -create \
            target/x86_64-apple-darwin/release/archive-extractor \
            target/aarch64-apple-darwin/release/archive-extractor \
            -output target/release/universal/archive-extractor

      - name: Create release archive
        run: |
          mkdir release
          cp target/release/universal/archive-extractor release/
          cp README.md release/
          cp LICENSE release/ 2>/dev/null || true
          cd release
          tar -czf ../archive-extractor-macos-universal.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: archive-extractor-macos-universal.tar.gz

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libgtk-3-dev \
            libatk1.0-dev \
            libcairo2-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            pkg-config

      - name: Cache cargo
        uses: swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target x86_64-unknown-linux-gnu --verbose

      - name: Create release archive
        run: |
          mkdir release
          cp target/x86_64-unknown-linux-gnu/release/archive-extractor release/
          cp README.md release/
          cp LICENSE release/ 2>/dev/null || true
          cd release
          tar -czf ../archive-extractor-linux-x86_64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: archive-extractor-linux-x86_64.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: ./release-assets

      - name: Download macOS universal artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-universal
          path: ./release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64
          path: ./release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release-assets/*
          generate_release_notes: true
          draft: true
